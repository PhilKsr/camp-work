    stroke="none"
  />
  
  <!-- Tent center line for depth -->
  <line
    x1="16"
    y1="8"
    x2="16"
    y2="26"
    stroke="#C47F35"
    stroke-width="1.5"
    opacity="0.6"
  />
</svg>