version: '3.8'

services:
  camp-work:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-OyN1AfUJihiIqUTbNUxU}
    container_name: camp-work
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "app.name=Camp Work"
      - "app.description=PWA für digitale Nomaden - Campingplätze mit Netzabdeckung"
      - "app.url=http://100.101.221.73:3030"
      - "app.icon=🏕️"
      - "app.category=travel"
    ports:
      - "100.101.221.73:3030:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_MAPTILER_KEY=${NEXT_PUBLIC_MAPTILER_KEY:-OyN1AfUJihiIqUTbNUxU}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: apps
    external: true